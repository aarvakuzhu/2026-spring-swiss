<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇨🇭 Swiss Trip 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2F2F7;
  --card: #FFFFFF;
  --ink: #1C1C1E;
  --sub: #8E8E93;
  --line: #E5E5EA;
  --blue: #007AFF;
  --green: #34C759;
  --orange: #FF9500;
  --red: #FF3B30;
  --purple: #AF52DE;
  --teal: #5AC8FA;
  --ashok: #007AFF;
  --rajesh: #34C759;
  --mc: var(--ashok);
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--ink); max-width: 430px; margin: 0 auto; min-height: 100vh; font-size: 15px; }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ── HEADER ── */
.hdr {
  background: var(--mc);
  color: white;
  padding: env(safe-area-inset-top, 12px) 16px 0;
  padding-top: max(env(safe-area-inset-top), 12px);
  position: sticky; top: 0; z-index: 200;
}
.hdr-top { display: flex; align-items: center; justify-content: space-between; padding-bottom: 10px; }
.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.hdr-name { font-weight: 700; font-size: 1rem; line-height: 1.1; }
.hdr-sub { font-size: 0.7rem; opacity: 0.8; }
.switch-row { display: flex; flex-direction: column; gap: 5px; padding-bottom: 10px; }
.chip-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.chip-row::-webkit-scrollbar { display: none; }
.member-chip {
  flex: 0 0 auto; display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 600;
  background: rgba(255,255,255,0.15); color: white;
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.member-chip.active { background: white; color: var(--mc); border-color: white; }
.member-chip .chip-avatar { font-size: 0.9rem; }

/* ── DAY STRIP ── */
.day-strip {
  background: var(--card);
  display: flex; overflow-x: auto; gap: 0;
  border-bottom: 1px solid var(--line);
  position: sticky; top: 78px; z-index: 199;
  scrollbar-width: none;
}
.day-strip::-webkit-scrollbar { display: none; }
.day-pill {
  flex: 0 0 auto; padding: 10px 14px;
  font-size: 0.72rem; font-weight: 500; color: var(--sub);
  border-bottom: 2px solid transparent;
  white-space: nowrap; transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
}
.day-pill.active { color: var(--mc); border-bottom-color: var(--mc); font-weight: 700; }
.day-pill .dp-emoji { font-size: 1rem; }
.day-pill .dp-date { font-size: 0.62rem; }

/* ── TAB BAR ── */
.tabs {
  display: flex; background: var(--card);
  border-top: 1px solid var(--line);
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 6px; font-size: 0.6rem; font-weight: 500; color: var(--sub);
  transition: color 0.15s;
}
.tab-item.active { color: var(--mc); }
.tab-item .ti-icon { font-size: 1.3rem; margin-bottom: 2px; }

/* ── SCROLL CONTENT ── */
.scroll-area { padding: 12px 14px 90px; }

/* ── CARDS ── */
.card { background: var(--card); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.card-hd {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px 0;
}
.card-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
.card-title { font-weight: 700; font-size: 0.88rem; }
.card-sub { font-size: 0.7rem; color: var(--sub); margin-top: 1px; }
.card-body { padding: 10px 14px 14px; }
.card-divider { height: 1px; background: var(--line); margin: 0 14px; }

/* ── SECTION LABEL ── */
.sec-label { font-size: 0.72rem; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.06em; margin: 16px 0 8px; }

/* ── WEATHER CARD ── */
.weather-card { background: var(--mc); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; color: white; }
.wc-top { display: flex; justify-content: space-between; align-items: flex-start; }
.wc-location { font-size: 0.72rem; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.05em; }
.wc-temp { font-size: 2.2rem; font-weight: 700; line-height: 1; }
.wc-desc { font-size: 0.78rem; opacity: 0.85; margin-top: 3px; }
.wc-icon { font-size: 2.8rem; }
.wc-links { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.wc-link { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 6px 12px; font-size: 0.72rem; font-weight: 600; color: white; }

/* ── TRAIN ROWS ── */
.train-row { display: flex; align-items: center; padding: 10px 14px; gap: 10px; border-bottom: 1px solid var(--line); }
.train-row:last-child { border-bottom: none; }
.tr-time { font-size: 0.82rem; font-weight: 700; color: var(--mc); min-width: 58px; }
.tr-body { flex: 1; }
.tr-route { font-size: 0.84rem; font-weight: 600; }
.tr-note { font-size: 0.7rem; color: var(--sub); margin-top: 1px; }
.tr-sbb { background: var(--orange); color: white; border-radius: 7px; padding: 4px 9px; font-size: 0.65rem; font-weight: 700; flex-shrink: 0; }
.fp-badge { font-size: 0.6rem; font-weight: 700; padding: 2px 5px; border-radius: 5px; margin-right: 4px; }
.fp-ashok { background: #DBEAFE; color: var(--ashok); }
.fp-rajesh { background: #DCFCE7; color: var(--rajesh); }
.fp-shared { background: #EDE9FE; color: var(--purple); }

/* ── ACTIVITY ROWS ── */
.act-row { display: flex; align-items: flex-start; padding: 10px 14px; gap: 12px; border-bottom: 1px solid var(--line); }
.act-row:last-child { border-bottom: none; }
.act-time { font-size: 0.72rem; color: var(--sub); min-width: 48px; font-weight: 500; padding-top: 2px; }
.act-body { flex: 1; }
.act-title { font-size: 0.85rem; font-weight: 600; }
.act-note { font-size: 0.72rem; color: var(--sub); margin-top: 2px; line-height: 1.4; }
.tag { display: inline-block; font-size: 0.6rem; font-weight: 700; padding: 2px 6px; border-radius: 5px; margin-left: 4px; vertical-align: middle; }
.tag-free { background: #DCFCE7; color: #15803D; }
.tag-book { background: #FEE2E2; color: #DC2626; }
.tag-ticket { background: #FEF9C3; color: #A16207; }
.tag-kids { background: #EDE9FE; color: #7C3AED; }

/* ── HOTEL CARD ── */
.hotel-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; }
.hotel-name { font-weight: 700; font-size: 0.88rem; }
.hotel-addr { font-size: 0.72rem; color: var(--sub); margin-top: 2px; }
.maps-btn { background: var(--blue); color: white; border-radius: 10px; padding: 7px 13px; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; }

/* ── RAINY DAY ── */
.rainy-card { background: #FFFBEB; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
.rainy-title { font-size: 0.72rem; font-weight: 700; color: #92400E; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.rainy-item { font-size: 0.82rem; color: #78350F; padding: 4px 0; border-bottom: 1px solid #FDE68A; display: flex; gap: 8px; }
.rainy-item:last-child { border-bottom: none; }
.rainy-item::before { content: '☂'; flex-shrink: 0; }

/* ── PERSONAL TIPS ── */
.tips-card { background: #1C1C1E; border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; border-left: 3px solid var(--mc); }
.tips-label { font-size: 0.65rem; font-weight: 700; color: var(--mc); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
.tip-item { font-size: 0.8rem; color: #E5E5EA; padding: 4px 0; display: flex; gap: 7px; line-height: 1.4; border-bottom: 1px solid #2C2C2E; }
.tip-item:last-child { border-bottom: none; }
.tip-item::before { content: '★'; color: #FF9500; font-size: 0.65rem; flex-shrink: 0; padding-top: 2px; }

/* ── SPLIT VIEW ── */
.split-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.split-card { background: var(--card); border-radius: var(--radius); padding: 12px; }
.split-card.ashok { border-top: 3px solid var(--ashok); }
.split-card.rajesh { border-top: 3px solid var(--rajesh); }
.split-fam { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.split-card.ashok .split-fam { color: var(--ashok); }
.split-card.rajesh .split-fam { color: var(--rajesh); }
.split-text { font-size: 0.75rem; color: var(--ink); line-height: 1.5; }

/* ── CHECKLIST ── */
.progress-bar-wrap { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.pb-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
.pb-label { font-size: 0.82rem; font-weight: 600; }
.pb-count { font-size: 0.78rem; color: var(--sub); }
.pb-track { background: var(--line); border-radius: 4px; height: 7px; overflow: hidden; }
.pb-fill { background: var(--mc); height: 100%; border-radius: 4px; transition: width 0.4s; }

.cl-group-label { font-size: 0.72rem; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.06em; padding: 12px 0 6px; }
.cl-item { background: var(--card); display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--line); }
.cl-item:first-of-type { border-radius: var(--radius) var(--radius) 0 0; }
.cl-item:last-of-type { border-radius: 0 0 var(--radius) var(--radius); border-bottom: none; }
.cl-item:only-of-type { border-radius: var(--radius); border-bottom: none; }
.cl-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.cl-check.done { background: var(--mc); border-color: var(--mc); }
.cl-check.done::after { content: '✓'; color: white; font-size: 0.75rem; font-weight: 700; }
.cl-body { flex: 1; }
.cl-text { font-size: 0.85rem; font-weight: 500; line-height: 1.4; }
.cl-text.done { text-decoration: line-through; color: var(--sub); }
.cl-meta { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
.cl-by { font-size: 0.65rem; color: var(--sub); }
.cl-done-by { font-size: 0.65rem; color: var(--green); }
.priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.p-high { background: var(--red); }
.p-medium { background: var(--orange); }
.p-low { background: var(--sub); }
.book-badge { font-size: 0.62rem; font-weight: 700; background: #FEE2E2; color: var(--red); padding: 2px 7px; border-radius: 5px; display: inline-block; margin-top: 4px; }

.cl-filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.cl-filter-row::-webkit-scrollbar { display: none; }
.cl-filter { flex: 0 0 auto; padding: 6px 13px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; background: var(--card); color: var(--sub); border: 1.5px solid var(--line); }
.cl-filter.active { background: var(--mc); color: white; border-color: var(--mc); }

.add-form { background: var(--card); border-radius: var(--radius); padding: 14px; margin-top: 10px; }
.add-form input, .add-form select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 10px; font-family: inherit; font-size: 0.84rem; color: var(--ink); background: var(--bg); margin-bottom: 8px; }
.add-form input:focus, .add-form select:focus { outline: none; border-color: var(--mc); }
.add-btn-full { width: 100%; padding: 11px; background: var(--mc); color: white; border-radius: 10px; font-weight: 700; font-size: 0.84rem; }

/* ── NOTES ── */
.note-card { background: var(--card); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; }
.note-card.pinned { border-left: 3px solid var(--orange); }
.note-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.note-author { font-size: 0.68rem; color: var(--sub); }
.note-actions { display: flex; gap: 8px; }
.note-pin { font-size: 0.85rem; cursor: pointer; }
.note-del { font-size: 0.72rem; color: var(--line); cursor: pointer; padding: 2px 5px; }
.note-del:hover { color: var(--red); }
.note-text { font-size: 0.84rem; line-height: 1.5; }
.note-type-badge { display: inline-block; font-size: 0.62rem; font-weight: 700; padding: 2px 6px; border-radius: 5px; margin-top: 6px; }
.nt-tip { background: #DCFCE7; color: #15803D; }
.nt-warning { background: #FEE2E2; color: #DC2626; }
.nt-interest { background: #EDE9FE; color: #7C3AED; }
.nt-note { background: var(--bg); color: var(--sub); }

.note-add-form { background: var(--card); border-radius: var(--radius); padding: 14px; margin-top: 8px; }
.note-add-form textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 10px; font-family: inherit; font-size: 0.84rem; color: var(--ink); background: var(--bg); min-height: 72px; resize: none; margin-bottom: 8px; }
.note-add-form textarea:focus { outline: none; border-color: var(--mc); }
.note-form-btns { display: flex; gap: 8px; }
.note-form-btns select { flex: 1; padding: 9px 10px; border: 1.5px solid var(--line); border-radius: 10px; font-family: inherit; font-size: 0.8rem; background: var(--bg); color: var(--ink); }
.note-submit { background: var(--mc); color: white; border-radius: 10px; padding: 9px 16px; font-weight: 700; font-size: 0.82rem; }

/* ── BOOKING ── */
.book-row { background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; border-bottom: 1px solid var(--line); }
.book-row:first-of-type { border-radius: var(--radius) var(--radius) 0 0; }
.book-row:last-of-type { border-radius: 0 0 var(--radius) var(--radius); border-bottom: none; }
.book-row:only-of-type { border-radius: var(--radius); border-bottom: none; }
.book-title { font-size: 0.84rem; font-weight: 600; }
.book-sub { font-size: 0.7rem; color: var(--sub); margin-top: 2px; }
.book-badge2 { font-size: 0.62rem; font-weight: 700; padding: 3px 8px; border-radius: 8px; flex-shrink: 0; }
.book-badge2.needed { background: #FEE2E2; color: var(--red); }
.book-badge2.optional { background: var(--bg); color: var(--sub); }

/* ── FLIGHT CARDS ── */
.flight-card { background: #1C1C1E; border-radius: var(--radius); padding: 14px; margin-bottom: 10px; color: white; }
.fc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.fc-fn { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.05em; }
.fc-label { font-size: 0.65rem; color: #8E8E93; margin-top: 2px; }
.fc-status { padding: 3px 9px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.fs-scheduled { background: #0A3D91; color: #60A5FA; }
.fs-active { background: #064E3B; color: #6EE7B7; }
.fs-landed { background: #2C2C2E; color: #8E8E93; }
.fs-delayed { background: #7F1D1D; color: #FCA5A5; }
.fc-route { display: flex; align-items: center; gap: 8px; }
.fc-apt { text-align: center; }
.fc-iata { font-size: 1.4rem; font-weight: 800; }
.fc-city { font-size: 0.62rem; color: #8E8E93; }
.fc-time { font-size: 0.8rem; font-weight: 600; margin-top: 2px; }
.fc-delay { font-size: 0.65rem; color: #FCA5A5; }
.fc-mid { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.fc-line { width: 100%; height: 1px; background: #3A3A3C; position: relative; }
.fc-dot { position: absolute; top: -3px; width: 7px; height: 7px; border-radius: 50%; background: var(--mc); animation: fmove 3s ease-in-out infinite alternate; }
@keyframes fmove { from { left: 5%; } to { left: 88%; } }
.fc-via { font-size: 0.62rem; color: #8E8E93; }
.fc-details { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
.fc-detail { background: #2C2C2E; border-radius: 8px; padding: 7px 10px; }
.fc-detail-label { font-size: 0.6rem; color: #8E8E93; text-transform: uppercase; }
.fc-detail-val { font-size: 0.8rem; font-weight: 600; margin-top: 1px; }
.fc-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.fc-live { display: flex; align-items: center; gap: 4px; font-size: 0.62rem; color: #6EE7B7; }
.fc-live-dot { width: 6px; height: 6px; border-radius: 50%; background: #6EE7B7; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.fc-refresh { background: #2C2C2E; color: #8E8E93; border-radius: 8px; padding: 5px 10px; font-size: 0.65rem; font-family: inherit; }

.airport-advisory { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--orange); }
.aa-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 2px; }
.aa-peak { font-size: 0.72rem; color: var(--orange); font-weight: 600; margin-bottom: 8px; }
.aa-tip { font-size: 0.78rem; color: var(--sub); padding: 5px 0; border-bottom: 1px solid var(--line); display: flex; gap: 8px; }
.aa-tip:last-of-type { border-bottom: none; }
.aa-tip::before { content: '→'; color: var(--orange); flex-shrink: 0; font-weight: 700; }
.aa-links { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
.aa-link { font-size: 0.7rem; color: var(--blue); background: var(--bg); padding: 5px 10px; border-radius: 8px; font-weight: 600; }

/* ── CHAT ── */
.chat-fab { position: fixed; bottom: calc(60px + env(safe-area-inset-bottom) + 12px); right: 16px; z-index: 300; width: 52px; height: 52px; border-radius: 50%; background: var(--mc); box-shadow: 0 4px 16px rgba(0,0,0,0.2); display: none; align-items: center; justify-content: center; font-size: 1.4rem; transition: transform 0.15s; }
.chat-fab.show { display: flex; }
.chat-fab:active { transform: scale(0.92); }
.chat-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 301; display: none; }
.chat-overlay.open { display: block; }
.chat-drawer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 430px; height: 75vh; background: var(--card); border-radius: 20px 20px 0 0; z-index: 302; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(.4,0,.2,1); }
.chat-drawer.open { transform: translateX(-50%) translateY(0); }
.chat-hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.chat-hdr-info { display: flex; align-items: center; gap: 10px; }
.chat-hdr-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--mc); display: flex; align-items: center; justify-content: center; font-size: 1rem; color: white; }
.chat-hdr-title { font-weight: 700; font-size: 0.9rem; }
.chat-hdr-sub { font-size: 0.68rem; color: var(--sub); }
.chat-close { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); color: var(--sub); font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { display: flex; gap: 7px; max-width: 88%; }
.chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }
.chat-msg.assistant { align-self: flex-start; }
.chat-bubble { padding: 9px 13px; border-radius: 16px; font-size: 0.84rem; line-height: 1.5; white-space: pre-wrap; }
.chat-msg.user .chat-bubble { background: var(--mc); color: white; border-radius: 16px 16px 4px 16px; }
.chat-msg.assistant .chat-bubble { background: var(--bg); color: var(--ink); border-radius: 16px 16px 16px 4px; }
.chat-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; margin-top: 2px; }
.chat-suggestions { display: flex; gap: 7px; overflow-x: auto; padding: 8px 14px 0; scrollbar-width: none; flex-shrink: 0; }
.chat-suggestions::-webkit-scrollbar { display: none; }

.typing-dot:nth-child(3){animation-delay:.4s}

/* ── TOAST ── */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; padding: 10px 18px; border-radius: 20px; font-size: 0.78rem; z-index: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }

.cl-section-hdr {

.cl-section-right { display: flex; align-items: center; gap: 8px; }

.cl-section-body { display: none; border-top: 1px solid var(--line); }
.cl-section-body.open { display: block; }

/* ── SEARCH ── */

/* ── LOADING ── */
.loader { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 0.84rem; }

// ── MEMBER MANAGEMENT ──
async function loadMembers() {
  try {
    const res = await fetch('/api/members');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allMembers = await res.json();
    if (!allMembers.length) { setTimeout(() => loadMembers(), 3000); return; }

    // Default to Ashok (first adult from ashok family)
    const defaultMember = allMembers.find(m => m.name === 'Ashok') || allMembers[0];
    applyMember(defaultMember);
    buildSwitchRow();
  } catch(e) {
    setTimeout(() => loadMembers(), 3000);
  }
}

function buildSwitchRow() {
  const row = document.getElementById('switchRow');
  // Row 1: adults (Ashok order first), Row 2: kids
  const adults = [...allMembers].filter(m=>m.role==='adult').sort((a,b)=>a.family==='ashok'?-1:1);
  const kids   = [...allMembers].filter(m=>m.role==='kid').sort((a,b)=>a.family==='ashok'?-1:1);

  const chip = m => `<button class="member-chip ${m._id===currentMember?._id?'active':''}" id="chip-${m._id}" onclick="switchTo('${m._id}')"><span class="chip-avatar">${m.avatar}</span>${m.name}</button>`;

  row.innerHTML = `
    <div class="chip-row">${adults.map(chip).join('')}</div>
    <div class="chip-row">${kids.map(chip).join('')}</div>
  `;
}

function switchTo(id) {
  const m = allMembers.find(x => x._id === id);
  if (!m) return;
  applyMember(m);
  buildSwitchRow();
}

function applyMember(m) {
  currentMember = m;
  const color = m.color || (m.family === 'ashok' ? '#007AFF' : '#34C759');
  document.documentElement.style.setProperty('--mc', color);
  document.getElementById('hdrAvatar').textContent = m.avatar;
  document.getElementById('hdrName').textContent = `${m.name} · ${m.family === 'ashok' ? 'Ashok' : 'Rajesh'} family`;
  document.getElementById('hdrSub').textContent = `${m.age} yrs · Switzerland Apr 4–12`;
  document.getElementById('chatFab').classList.add('show');
  document.getElementById('chatWelcome').textContent = m.role === 'kid'
    ? `Hey ${m.name}! 🎉 Ask me anything about Switzerland — what's on your mind?`
    : `Hi ${m.name}! Ask me anything about the trip — itinerary, trains, packing, local tips.`;

  // Restore last day
  fetch(`/api/members/${m._id}/state`).then(r => r.json()).then(s => {
    if (s?.lastDayIndex !== undefined) currentDay = s.lastDayIndex;
    renderAll();
  }).catch(() => renderAll());
}

function renderAll() {
  buildDayStrip();
  renderCurrentTab();
}

// ── DAY STRIP ──
function buildDayStrip() {
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = DAYS.map((d,i) => `
    <button class="day-pill ${i===currentDay?'active':''}" onclick="goDay(${i})">
      <span class="dp-emoji">${d.emoji}</span>
      <span class="dp-date">${d.short}</span>
    </button>`).join('');
  // Scroll active into view
  strip.children[currentDay]?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function goDay(i) {
  currentDay = i;
  buildDayStrip();
  renderCurrentTab();
  document.getElementById('scrollArea').scrollTop = 0;
  if (currentMember) {
    fetch(`/api/members/${currentMember._id}/state`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({lastDayIndex:i})});
  }
}

// ── TAB ──
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderCurrentTab();
  document.getElementById('scrollArea').scrollTop = 0;
}

function renderCurrentTab() {
  if (currentTab==='itinerary') renderItinerary();
  else if (currentTab==='checklist') { loadChecklist(); }
  else if (currentTab==='search') { renderSearch(); }
  else if (currentTab==='notes') { loadNotes(currentDay); }
  else if (currentTab==='booking') renderBooking();
}

// ── ITINERARY ──
async function renderItinerary() {
  const d = DAYS[currentDay];
  const m = currentMember;
  const myFam = m?.family;
  const isMyFam = f => f==='shared' || f===myFam;
  let html = '';

  // Personal tips
  const tips = m ? getPersonalTips(m, currentDay) : [];
  if (tips.length) {
    html += `<div class="tips-card">
      <div class="tips-label">✨ Just for you, ${m.name}</div>
      ${tips.map(t=>`<div class="tip-item">${t}</div>`).join('')}
    </div>`;
  }

  // Split banner
  if (d.split && d.ashokNote) {
    html += `<div class="split-row">
      <div class="split-card ashok"><div class="split-fam">🔵 Ashok Family</div><div class="split-text">${d.ashokNote.replace(/\n/g,'<br>')}</div></div>
      <div class="split-card rajesh"><div class="split-fam">🟢 Rajesh Family</div><div class="split-text">${d.rajeshNote.replace(/\n/g,'<br>')}</div></div>
    </div>`;
  }

  // Flight status (travel days)
  if (TRIP_FLIGHTS[currentDay]) {
    html += await buildFlightSection(currentDay);
  }

  // Weather
  if (d.weather) {
    html += `<div class="weather-card">
      <div class="wc-top">
        <div>
          <div class="wc-location">${d.weather.loc}</div>
          <div class="wc-temp">${d.weather.temp}</div>
          <div class="wc-desc">${d.weather.desc}</div>
        </div>
        <div class="wc-icon">${d.weather.icon}</div>
      </div>
      <div class="wc-links">
        <a href="${d.weather.forecast}" class="wc-link" target="_blank">📡 Forecast</a>
        ${d.weather.webcam ? `<a href="${d.weather.webcam}" class="wc-link" target="_blank">📷 Webcam</a>` : ''}
      </div>
    </div>`;
  }

  // Trains
  const myTrains = (d.trains||[]).filter(t=>isMyFam(t.family));
  if (myTrains.length) {
    html += `<div class="sec-label">🚂 Trains & Transfers</div>
    <div class="card">`;
    myTrains.forEach(t => {
      const badge = t.family==='shared'?`<span class="fp-badge fp-shared">Both</span>`:t.family==='ashok'?`<span class="fp-badge fp-ashok">Ashok</span>`:`<span class="fp-badge fp-rajesh">Rajesh</span>`;
      html += `<div class="train-row">
        <div class="tr-time">${t.time}</div>
        <div class="tr-body">${badge}<div class="tr-route">${t.desc}</div><div class="tr-note">${t.note||''}</div></div>
        ${t.sbb?`<a href="${t.sbb}" class="tr-sbb" target="_blank">↗</a>`:''}
      </div>`;
    });
    html += `</div>`;
  }

  // Activities
  if (d.activities?.length) {
    html += `<div class="sec-label">📍 Activities</div><div class="card">`;
    d.activities.forEach(a => {
      const badge = a.badge==='free'?`<span class="tag tag-free">Free</span>`:a.badge==='book'?`<span class="tag tag-book">Book!</span>`:a.badge==='ticket'?`<span class="tag tag-ticket">Ticket</span>`:'';
      const kidTag = a.kids?`<span class="tag tag-kids">👧</span>`:'';
      html += `<div class="act-row">
        <div class="act-time">${a.time}</div>
        <div class="act-body">
          <div class="act-title">${a.title}${badge}${kidTag}</div>
          ${a.note?`<div class="act-note">${a.note}</div>`:''}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Hotels
  const hotels = [d.hotel, d.hotel2].filter(Boolean).filter(h=>isMyFam(h.family)||h.family==='shared');
  if (hotels.length) {
    html += `<div class="sec-label">🏨 Tonight's Stay</div>`;
    hotels.forEach(h => {
      html += `<div class="card">
        <div class="hotel-row">
          <div><div class="hotel-name">${h.name}</div><div class="hotel-addr">${h.addr}</div></div>
          <a href="${h.maps}" class="maps-btn" target="_blank">Maps</a>
        </div>
      </div>`;
    });
  }

  // Rainy day
  if (d.rainy?.length) {
    html += `<div class="rainy-card">
      <div class="rainy-title">☂ If it rains…</div>
      ${d.rainy.map(r=>`<div class="rainy-item">${r}</div>`).join('')}
    </div>`;
  }

  document.getElementById('scrollArea').innerHTML = html;
}

// ── FLIGHT SECTION ──
async function buildFlightSection(dayIndex) {
  const flights = TRIP_FLIGHTS[dayIndex];
  const myFam = currentMember?.family;
  // Keep flights in chronological order (as defined in TRIP_FLIGHTS)
  let html = `<div class="sec-label">✈️ Flights</div>`;
  for (const f of flights) {
    html += await buildFlightCard(f);
  }
  // Airport advisory
  const airports = dayIndex===0 ? ['ATL'] : (myFam==='ashok'?['GVA']:['ZUR']);
  for (const code of airports) html += await buildAirportCard(code);
  return html;
}

async function buildFlightCard(f) {
  let live = null;
  try { const r = await fetch('/api/flights/'+f.fn); if(r.ok) live = await r.json(); } catch(e){}
  const status = live?.status || 'scheduled';
  const depTime = live?.departure?.actual || live?.departure?.estimated || f.dep;
  const arrTime = live?.arrival?.actual || live?.arrival?.estimated || f.arr;
  const gate = live?.departure?.gate;
  const terminal = live?.departure?.terminal;
  const delay = live?.departure?.delay;
  const isLive = live?.live;
  const famColor = f.family==='ashok'?'var(--ashok)':'var(--rajesh)';
  const famBadge = f.family==='ashok'?`<span class="fp-badge fp-ashok">Ashok</span>`:`<span class="fp-badge fp-rajesh">Rajesh</span>`;

  return `<div class="flight-card" style="border-left:3px solid ${famColor}">
    <div class="fc-top">
      <div>${famBadge}<div class="fc-fn">${f.fn}</div><div class="fc-label">${f.airline}${f.booking?` · Ref: ${f.booking}`:''}</div></div>
      <span class="fc-status fs-${status}">${status}</span>
    </div>
    <div class="fc-route">
      <div class="fc-apt">
        <div class="fc-iata">${f.from}</div>
        <div class="fc-city">${AIRPORT_NAMES[f.from]||f.from}</div>
        <div class="fc-time">${depTime}</div>
        ${delay?`<div class="fc-delay">+${delay}m</div>`:''}
      </div>
      <div class="fc-mid">
        <div class="fc-line"><div class="fc-dot"></div></div>
        <div class="fc-via">${f.via?'via '+AIRPORT_NAMES[f.via]:'✈'}</div>
      </div>
      <div class="fc-apt" style="text-align:right">
        <div class="fc-iata">${f.to}</div>
        <div class="fc-city">${AIRPORT_NAMES[f.to]||f.to}</div>
        <div class="fc-time">${arrTime}</div>
      </div>
    </div>
    ${(gate||terminal)?`<div class="fc-details">
      ${terminal?`<div class="fc-detail"><div class="fc-detail-label">Terminal</div><div class="fc-detail-val">${terminal}</div></div>`:''}
      ${gate?`<div class="fc-detail"><div class="fc-detail-label">Gate</div><div class="fc-detail-val">${gate}</div></div>`:''}
    </div>`:''}
    <div class="fc-footer">
      ${isLive?`<div class="fc-live"><div class="fc-live-dot"></div>Live</div>`:`<div style="font-size:0.62rem;color:#636366">Scheduled times</div>`}
      <button class="fc-refresh" onclick="refreshFlights(${currentDay})">↻ Refresh</button>
    </div>
  </div>`;
}

async function refreshFlights(dayIndex) {
  showToast('Refreshing…');
  renderItinerary();
}

async function buildAirportCard(code) {
  let d = null;
  try { const r = await fetch('/api/flights/airport/'+code); if(r.ok) d = await r.json(); } catch(e){}
  if (!d) return '';
  return `<div class="airport-advisory">
    <div class="aa-name">🛂 ${d.name} (${code})</div>
    <div class="aa-peak">⏰ ${d.peakHours}</div>
    ${d.tips.map(t=>`<div class="aa-tip">${t}</div>`).join('')}
    <div class="aa-links">
      ${d.myTsaLink?`<a href="${d.myTsaLink}" class="aa-link" target="_blank">📱 MyTSA</a>`:''}
      ${d.officialLink?`<a href="${d.officialLink}" class="aa-link" target="_blank">🔗 Airport Security</a>`:''}
      ${d.flightAwareLink?`<a href="${d.flightAwareLink}" class="aa-link" target="_blank">✈ FlightAware</a>`:''}
    </div>
  </div>`;
}

// Track which sections are open
const clOpenSections = new Set(['before-travel','packing']); // default open

function renderChecklist() {
  const isKid = currentMember?.role === 'kid';
  const visibleItems = clData.filter(i => {
    if (i.audience==='adults' && isKid) return false;
    if (i.audience==='kids' && !isKid) return false;
    return true;
  });

  const groups = {};
  visibleItems.forEach(i => { if(!groups[i.category]) groups[i.category]=[]; groups[i.category].push(i); });
  const pOrder = {high:0,medium:1,low:2};
  Object.keys(groups).forEach(k => groups[k].sort((a,b)=>(pOrder[a.priority]||1)-(pOrder[b.priority]||1)));

  const sectionMeta = {
    'packing':        {label:'Things to Buy / Pack', icon:'🛍', bg:'#FFF7ED'},
    'before-travel':  {label:'Before You Travel',    icon:'📋', bg:'#EFF6FF'},
    'during-travel':  {label:'During Travel',         icon:'🧳', bg:'#ECFDF5'},
    'booking':        {label:'Bookings & Tickets',   icon:'🎫', bg:'#FDF4FF'},
    'note':           {label:'Areas to Explore',     icon:'⭐', bg:'#FEFCE8'},
  };

  // Overall progress (exclude notes)
  const countable = visibleItems.filter(i=>i.category!=='note');
  const myDone = countable.filter(i=>i.completions?.find(c=>c.memberId===currentMember?._id)).length;
  const pct = countable.length ? Math.round((myDone/countable.length)*100) : 0;

  let html = `<div class="progress-bar-wrap">
    <div class="pb-row"><span class="pb-label">Overall progress</span><span class="pb-count">${myDone}/${countable.length}</span></div>
    <div class="pb-track"><div class="pb-fill" style="width:${pct}%"></div></div>
  </div>`;

  const catOrder = ['packing','before-travel','during-travel','booking','note'];
  catOrder.forEach(cat => {
    const items = groups[cat];
    if (!items?.length) return;
    const meta = sectionMeta[cat] || {label:cat, icon:'📌', bg:'#F5F5F5'};
    const doneCount = items.filter(i=>i.completions?.find(c=>c.memberId===currentMember?._id)).length;
    const isOpen = clOpenSections.has(cat);
    const radius = 16;
    const circ = 2 * Math.PI * radius;
    const dash = (doneCount/items.length)*circ;

    html += `<div class="cl-section">
      <div class="cl-section-hdr" onclick="toggleSection('${cat}')">
        <div class="cl-section-left">
          <div class="cl-section-icon" style="background:${meta.bg}">${meta.icon}</div>
          <div>
            <div class="cl-section-title">${meta.label}</div>
            <div class="cl-section-count">${doneCount}/${items.length} done</div>
          </div>
        </div>
        <div class="cl-section-right">
          <svg class="cl-mini-progress" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="${radius}" fill="none" stroke="#E5E5EA" stroke-width="3"/>
            <circle cx="18" cy="18" r="${radius}" fill="none" stroke="var(--mc)" stroke-width="3"
              stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
              stroke-linecap="round" transform="rotate(-90 18 18)"/>
            <text x="18" y="22" text-anchor="middle" font-size="9" font-weight="700" fill="var(--ink)">${Math.round(doneCount/items.length*100)}%</text>
          </svg>
          <span class="cl-chevron ${isOpen?'open':''}">›</span>
        </div>
      </div>
      <div class="cl-section-body ${isOpen?'open':''}">
        ${items.map(item => {
          const isDone = !!item.completions?.find(c=>c.memberId===currentMember?._id);
          const others = item.completions?.filter(c=>c.memberId!==currentMember?._id).map(c=>c.memberName)||[];
          const dotClass = item.priority==='high'?'p-high':item.priority==='medium'?'p-medium':'p-low';
          return `<div class="cl-item" id="ci-${item._id}">
            <div class="priority-dot ${dotClass}" style="margin-top:4px"></div>
            <div class="cl-check ${isDone?'done':''}" onclick="toggleCheck('${item._id}')"></div>
            <div class="cl-body">
              <div class="cl-text ${isDone?'done':''}">${item.text}</div>
              <div class="cl-meta">
                ${item.audience==='adults'?`<span style="font-size:0.6rem;background:#DBEAFE;color:var(--ashok);padding:1px 5px;border-radius:4px;font-weight:700">Adults</span>`:''}
                ${item.audience==='kids'?`<span style="font-size:0.6rem;background:#EDE9FE;color:var(--purple);padding:1px 5px;border-radius:4px;font-weight:700">Kids</span>`:''}
                ${item.dayIndex!=null?`<span style="font-size:0.6rem;background:#F0FDF4;color:#15803D;padding:1px 5px;border-radius:4px;font-weight:700">Apr ${item.dayIndex+4}</span>`:''}
                ${item.addedBy?`<span class="cl-by">💬 ${item.addedBy}</span>`:''}
                ${others.length?`<span class="cl-done-by">✓ ${others.join(', ')}</span>`:''}
              </div>
              ${item.isBookingRequired&&item.bookingUrl?`<a href="${item.bookingUrl}" class="book-badge" target="_blank">🔗 Book now ↗</a>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  html += `<div class="add-form">
    <input type="text" id="newItemText" placeholder="Add an item…">
    <select id="newItemCat">
      <option value="packing">Packing / Things to buy</option>
      <option value="before-travel">Pre-trip task</option>
      <option value="during-travel">During travel</option>
      <option value="booking">Booking needed</option>
      <option value="note">Area to explore</option>
    </select>
    <button class="add-btn-full" onclick="addClItem()">Add to shared checklist</button>
  </div>`;

  document.getElementById('scrollArea').innerHTML = html;
}

function toggleSection(cat) {
  if (clOpenSections.has(cat)) clOpenSections.delete(cat);
  else clOpenSections.add(cat);
  renderChecklist();
}

function setClFilter(f) { clFilter=f; renderChecklist(); }

async function toggleCheck(id) {
  if (!currentMember) return;
  try {
    const r = await fetch(`/api/checklist/${id}/complete`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({memberId:currentMember._id,memberName:currentMember.name,family:currentMember.family})});
    const updated = await r.json();
    const idx = clData.findIndex(i=>i._id===id);
    if (idx>=0) clData[idx]=updated;
    renderChecklist();
  } catch(e){ showToast('Could not save'); }
}

async function addClItem() {
  const text = document.getElementById('newItemText').value.trim();
  const cat = document.getElementById('newItemCat').value;
  if (!text) return;
  try {
    const r = await fetch('/api/checklist',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,category:cat,addedBy:currentMember.name,addedByFamily:currentMember.family,relevantFamilies:['ashok','rajesh'],audience:'all'})});
    clData.push(await r.json());
    document.getElementById('newItemText').value='';
    renderChecklist();
    showToast('Added ✓');
  } catch(e){ showToast('Could not add'); }
}

// ── NOTES ──
async function loadNotes(dayIndex) {
  document.getElementById('scrollArea').innerHTML = `<div class="loader">Loading notes…</div>`;
  try {
    const r = await fetch(`/api/notes?dayIndex=${dayIndex}`);
    notesData = await r.json();
    renderNotes();
  } catch(e){ document.getElementById('scrollArea').innerHTML=`<div class="loader">Could not load notes</div>`; }
}

function renderNotes() {
  const day = DAYS[currentDay];
  let html = `<div class="sec-label">📝 Notes for ${day.short}</div>`;
  if (!notesData.length) html += `<div class="loader" style="padding:20px">No notes yet — add the first one!</div>`;
  notesData.forEach(n => {
    const canDel = currentMember && n.memberId===currentMember._id;
    html += `<div class="note-card ${n.pinned?'pinned':''}" id="note-${n._id}">
      <div class="note-hdr">
        <div class="note-author">${n.addedBy} · ${n.addedByFamily} · ${new Date(n.createdAt).toLocaleDateString()}</div>
        <div class="note-actions">
          <span class="note-pin" onclick="pinNote('${n._id}',${!n.pinned})">${n.pinned?'📌':'📍'}</span>
          ${canDel?`<span class="note-del" onclick="deleteNote('${n._id}')">✕</span>`:''}
        </div>
      </div>
      <div class="note-text">${n.text}</div>
      <span class="note-type-badge nt-${n.type}">${n.type}</span>
    </div>`;
  });
  html += `<div class="note-add-form">
    <textarea id="newNoteText" placeholder="Add a note, tip, or point of interest…"></textarea>
    <div class="note-form-btns">
      <select id="newNoteType">
        <option value="note">General note</option>
        <option value="tip">Tip 💡</option>
        <option value="warning">Warning ⚠️</option>
        <option value="interest">Point of interest ⭐</option>
      </select>
      <button class="note-submit" onclick="addNote()">Add</button>
    </div>
  </div>`;
  document.getElementById('scrollArea').innerHTML = html;
}

async function addNote() {
  const text = document.getElementById('newNoteText').value.trim();
  const type = document.getElementById('newNoteType').value;
  if (!text || !currentMember) return;
  try {
    const r = await fetch('/api/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,type,dayIndex:currentDay,addedBy:currentMember.name,addedByFamily:currentMember.family,memberId:currentMember._id})});
    notesData.unshift(await r.json());
    document.getElementById('newNoteText').value='';
    renderNotes();
    showToast('Note added ✓');
  } catch(e){ showToast('Could not add note'); }
}

async function pinNote(id, pinned) {
  try {
    const r = await fetch(`/api/notes/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({pinned})});
    const updated = await r.json();
    const idx = notesData.findIndex(n=>n._id===id);
    if(idx>=0){notesData[idx]=updated; notesData.sort((a,b)=>b.pinned-a.pinned);}
    renderNotes();
  } catch(e){ showToast('Could not pin'); }
}

async function deleteNote(id) {
  try {
    await fetch(`/api/notes/${id}`,{method:'DELETE'});
    notesData = notesData.filter(n=>n._id!==id);
    renderNotes();
  } catch(e){ showToast('Could not delete'); }
}

// ── BOOKING TAB ──
function renderBooking() {

// ── CHAT ──
function openChat() {
  document.getElementById('chatDrawer').classList.add('open');
  document.getElementById('chatOverlay').classList.add('open');
  document.getElementById('chatFab').classList.remove('show');
  document.getElementById('chatSub').textContent = `Viewing: ${DAYS[currentDay].short}`;
  setTimeout(()=>document.getElementById('chatInput').focus(),350);
}
function closeChat() {
  document.getElementById('chatDrawer').classList.remove('open');
  document.getElementById('chatOverlay').classList.remove('open');
  document.getElementById('chatFab').classList.add('show');
}
function sendSuggestion(btn) {
  document.getElementById('chatSuggestions').style.display='none';
  sendChat(btn.textContent);
}
function appendMsg(role, text) {
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'chat-msg '+role;
  const av = document.createElement('div');
  av.className = 'chat-avatar';
  av.textContent = role==='user'?(currentMember?.avatar||'👤'):'🇨🇭';
  const bub = document.createElement('div');
  bub.className = 'chat-bubble';
  bub.textContent = text;
  div.appendChild(av); div.appendChild(bub);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bub;
}
function showTyping() {
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'chat-msg assistant'; div.id = 'typing';
  div.innerHTML = `<div class="chat-avatar">🇨🇭</div><div class="chat-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

async function sendChat(override) {
  const input = document.getElementById('chatInput');
  const text = override || input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('chatSend').disabled = true;
  appendMsg('user', text);
  chatHistory.push({role:'user',content:text});
  showTyping();
  try {
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({systemPrompt:buildSystemPrompt(),messages:chatHistory})});
    const data = await r.json();
    removeTyping();
    const reply = data.reply || (data.error ? `⚠️ ${data.detail||data.error}` : 'No response — try again');
    appendMsg('assistant', reply);
    chatHistory.push({role:'assistant',content:reply});
    if (chatHistory.length>20) chatHistory=chatHistory.slice(-20);
  } catch(e){ removeTyping(); appendMsg('assistant','Connection issue — check your internet and try again.'); }
  document.getElementById('chatSend').disabled = false;
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}


// ── SEARCH ──
let searchHistory = JSON.parse(localStorage.getItem('swissSearch') || '[]').slice(0,8);
const QUICK_SEARCHES = [
  `Best restaurants in ${['Interlaken','Grindelwald','Zermatt','Lucerne','Zurich'][Math.min(Math.max(0,new Date()-new Date('2026-04-05'))/ 86400000|0, 4)]}`,
  'Fondue restaurants open tonight',
  'Train from Interlaken to Grindelwald',
  'Indian restaurants in Zurich',
  'What time do Swiss restaurants close?',
  'Vegetarian options in Zermatt',
  'Best bakery for breakfast Wilderswil',
  'SBB train delay info',
];

function renderSearch() {
  const loc = DAYS[currentDay].location.split('·')[0].trim();
  let html = `<div class="search-bar-wrap">
    <div class="search-bar" id="searchBar">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="Search restaurants, trains, tips…"
        onkeydown="if(event.key==='Enter')doSearch()"
        oninput="document.getElementById('searchClear').style.display=this.value?'':'none'"
        onfocus="document.getElementById('searchBar').classList.add('focused')"
        onblur="document.getElementById('searchBar').classList.remove('focused')">
      <span class="search-clear" id="searchClear" style="display:none" onclick="clearSearch()">✕</span>
    </div>
    <div class="search-chips">
      <button class="search-chip" onclick="quickSearch('Best restaurants in ${loc}')">🍽 Restaurants near me</button>
      <button class="search-chip" onclick="quickSearch('Fondue or raclette near ${loc}')">🧀 Fondue tonight</button>
      <button class="search-chip" onclick="quickSearch('Train options from ${loc} area')">🚂 Train options</button>
      <button class="search-chip" onclick="quickSearch('What to do in ${loc} with kids')">👧 Kids activities</button>
      <button class="search-chip" onclick="quickSearch('Indian or Asian restaurants in ${loc}')">🍛 Asian food</button>
      <button class="search-chip" onclick="quickSearch('Restaurant opening hours ${loc}')">⏰ Opening hours</button>
    </div>
  </div>
  <div id="searchResults">`;

  if (searchHistory.length) {
    html += '<div class="search-history"><div class="sh-label">Recent searches</div>';
    searchHistory.forEach((q,i) => {
      html += '<div class="sh-item" onclick="quickSearch(searchHistory['+i+'])">' +
        '<span class="sh-icon">🕐</span>' +
        '<span class="sh-text">'+q+'</span>' +
        '<span class="sh-del" onclick="event.stopPropagation();removeHistory('+i+')">✕</span>' +
        '</div>';
    });
    html += '</div>';
  }


  html += `</div>`;
  document.getElementById('scrollArea').innerHTML = html;
}

function encodeSearch(idx) {
  // Called from onclick — returns nothing, just triggers quickSearch
  quickSearch(searchHistory[idx]);
  return false;
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchResults').innerHTML = '';
  renderSearch();
}

function quickSearch(q) {
  document.getElementById('searchInput').value = q;
  document.getElementById('searchClear').style.display = '';
  doSearch();
}

function removeHistory(idx) {
  searchHistory.splice(idx, 1);
  localStorage.setItem('swissSearch', JSON.stringify(searchHistory));
  renderSearch();
}

async function doSearch() {
  const q = document.getElementById('searchInput')?.value?.trim();
  if (!q) return;

  // Save to history
  searchHistory = [q, ...searchHistory.filter(x=>x!==q)].slice(0,8);
  try { localStorage.setItem('swissSearch', JSON.stringify(searchHistory)); } catch(e){}

  document.getElementById('searchResults').innerHTML =
    '<div class="search-loading"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span class="search-loading-text">Searching…</span></div>';

  try {
    const r = await fetch('/api/search', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ query: q, dayIndex: currentDay })
    });
    const data = await r.json();
    const raw = data.reply || (data.error ? '⚠️ ' + (data.detail||data.error) : 'No results — try rephrasing');

    // Basic markdown-style rendering
      const html = raw
        .replace(/[*][*](.+?)[*][*]/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--mc);font-weight:600">$1 ↗</a>')
        .replace(/\n---\n/g, '<hr style="margin:10px 0;border:none;border-top:1px solid var(--line)">')
        .replace(/\n/g, '<br>');

    document.getElementById('searchResults').innerHTML =
      '<div class="search-result">' + html + '</div>' +
      '<div style="text-align:center;margin-top:10px">' +
        '<button class="search-chip" onclick="document.getElementById(\'searchInput\').focus()" style="background:var(--card)">🔍 New search</button>' +
      '</div>';
  } catch(e) {
    document.getElementById('searchResults').innerHTML = '<div class="search-result">⚠️ Search unavailable — check connection</div>';
  }
}
